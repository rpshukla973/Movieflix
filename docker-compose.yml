version: "3.8"
services:
  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: movieflix
      MYSQL_USER: movie_user
      MYSQL_PASSWORD: movie_pass
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql

  mailhog:
    image: mailhog/mailhog
    ports:
      - "1025:1025"
      - "8025:8025"

  backend:
    build: ./backend
    ports:
      - "8080:8080"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql:3306/movieflix
      - SPRING_DATASOURCE_USERNAME=movie_user
      - SPRING_DATASOURCE_PASSWORD=movie_pass
      - JWT_SECRET=U29tZVN1cGVyU2VjdXJlQmFzZTY0S2V5Rm9yTW92aWVmbGl4MTIzNDU2Nzg5MA==
      - STORAGE_LOCAL_PATH=/app/storage
      - MAIL_HOST=mailhog
      - MAIL_PORT=1025
    depends_on:
      - mysql
      - mailhog
    volumes:
      - backend_storage:/app/storage

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    environment:
      - VITE_API_BASE_URL=http://localhost:8080/api
    depends_on:
      - backend

volumes:
  db_data:
  backend_storage:
